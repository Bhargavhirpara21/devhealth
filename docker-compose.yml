services:
  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - PORT=8080
      - DB_PATH=/data/devhealth.db
    volumes:
      - db-data:/data
    restart: unless-stopped

  dashboard:
    build:
      context: ./dashboard
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db-data:
